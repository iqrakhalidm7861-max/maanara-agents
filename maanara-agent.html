<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maanara AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --gold-pale: #f5e9c4;
    --dark: #0c0a06;
    --dark2: #161208;
    --dark3: #1f1a0f;
    --cream: #faf6ee;
    --muted: #8a7d62;
    --border: rgba(201,168,76,0.2);
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* BACKGROUND */
  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%),
                var(--dark);
    z-index: 0;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  /* LAYOUT */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 800px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: rgba(12,10,6,0.8);
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-mark::before {
    content: '✦';
    color: var(--gold);
    font-size: 14px;
  }

  .logo-text {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    letter-spacing: 0.15em;
    color: var(--gold-light);
  }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MODES */
  .modes {
    display: flex;
    gap: 6px;
    padding: 14px 24px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }

  .modes::-webkit-scrollbar { display: none; }

  .mode-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 100px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .mode-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .mode-btn.active {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* CHAT AREA */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .avatar.ai {
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--border);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
  }

  .avatar.user-av {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream);
    font-size: 14px;
  }

  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
    font-weight: 300;
  }

  .msg.ai .bubble {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--cream);
  }

  .msg.user .bubble {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    border-top-right-radius: 4px;
    color: var(--cream);
  }

  .bubble strong {
    color: var(--gold-light);
    font-weight: 500;
  }

  .bubble .section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .bubble .tag {
    display: inline-block;
    padding: 3px 10px;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  /* TYPING */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* SUGGESTIONS */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 24px 16px;
    flex-shrink: 0;
  }

  .suggestion {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 100px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .suggestion:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.06);
  }

  /* INPUT */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-shrink: 0;
    background: rgba(12,10,6,0.8);
    backdrop-filter: blur(20px);
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    resize: none;
    min-height: 46px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: rgba(201,168,76,0.5); }

  .send-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #a07830);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 28px rgba(201,168,76,0.4);
  }

  .send-btn:active { transform: scale(0.97); }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--dark);
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 40px 20px;
  }

  .welcome-mark {
    font-family: 'Cinzel', serif;
    font-size: 40px;
    color: var(--gold);
    opacity: 0.3;
    margin-bottom: 16px;
  }

  .welcome h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--gold-light);
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 340px;
    margin: 0 auto;
  }

  /* COPY BTN */
  .copy-btn {
    margin-top: 10px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 100px;
    font-size: 11px;
    font-family: 'Jost', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .copy-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px 12px; }
    .modes { padding: 12px 16px; }
    .chat { padding: 16px; }
    .suggestions { padding: 0 16px 12px; }
    .input-area { padding: 12px 16px 16px; }
    .bubble { max-width: 88%; font-size: 13.5px; }
    .welcome h2 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark"></div>
      <div>
        <div class="logo-text">MAANARA</div>
        <div class="logo-sub">AI Business Agent</div>
      </div>
    </div>
    <div class="status-dot"></div>
  </header>

  <!-- MODES -->
  <div class="modes">
    <button class="mode-btn active" onclick="setMode('all', this)">✦ All Tasks</button>
    <button class="mode-btn" onclick="setMode('supplier', this)">🔍 Find Suppliers</button>
    <button class="mode-btn" onclick="setMode('captions', this)">✍️ Social Captions</button>
    <button class="mode-btn" onclick="setMode('message', this)">📩 Supplier Messages</button>
    <button class="mode-btn" onclick="setMode('launch', this)">🚀 Product Launch</button>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div class="welcome">
      <div class="welcome-mark">✦</div>
      <h2>Your Maanara Agent is ready</h2>
      <p>I'm here to help you find suppliers, write captions, draft professional messages, and plan your launches. What shall we work on?</p>
    </div>
  </div>

  <!-- SUGGESTIONS -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="useSuggestion(this)">Find me a Multani jewelry supplier</button>
    <button class="suggestion" onclick="useSuggestion(this)">Write 3 TikTok captions for my launch</button>
    <button class="suggestion" onclick="useSuggestion(this)">Draft a message to a new supplier</button>
    <button class="suggestion" onclick="useSuggestion(this)">Plan my first product launch</button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="input" placeholder="Ask your Maanara agent anything…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  let currentMode = 'all';
  let isLoading = false;
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');

  const modePrompts = {
    all: `You are the Maanara AI Business Agent. Maanara is a UK-registered jewelry brand inspired by Multani heritage from Pakistan, owned by a South Asian woman building her business from scratch. You help with 4 things: finding jewelry suppliers, writing social media captions, drafting professional supplier messages, and planning product launches. Be warm, encouraging, practical and specific. Always give actionable advice. Keep responses concise but helpful. Use line breaks for readability. Never use bullet symbols — use clean formatting instead.`,
    
    supplier: `You are the Maanara Supplier Research Agent. Maanara is a UK-registered jewelry brand inspired by Multani (Pakistani) heritage. Your job is to help find reliable wholesale jewelry suppliers — particularly those who offer Pakistani, South Asian, or Multani-style jewelry in both gold plated and silver/oxidised finishes. The owner wants to start with sample orders under £500. Give specific supplier names, platforms, search terms, and advice on what to look for and what questions to ask. Be practical and specific.`,
    
    captions: `You are the Maanara Social Media Agent. Maanara is a UK-registered jewelry brand inspired by Multani heritage from Pakistan. The brand is luxurious yet accessible, celebrating Pakistani culture through jewelry. Write captions for Instagram and TikTok that are authentic, beautiful, and culturally proud. Always include relevant hashtags. Mix English with occasional Urdu words for warmth. Keep captions engaging and on-brand. When asked for captions, always write at least 3 options with different tones.`,
    
    message: `You are the Maanara Supplier Communication Agent. Maanara is a UK-registered jewelry brand. Your job is to write professional, confident, and clear messages to potential jewelry suppliers. Messages should be concise, business-like, and include key details like: what Maanara sells, what they're looking for, that they want samples first, and that they're a serious registered UK business. Never sound desperate. Always sound professional and in control.`,
    
    launch: `You are the Maanara Product Launch Planner. Maanara is a UK-registered jewelry brand inspired by Multani Pakistani heritage. Your job is to create detailed, realistic product launch plans. Include: pre-launch content plan, launch day activities, social media strategy, pricing guidance, and post-launch follow up. Be specific about timelines, platforms (Instagram, TikTok), and what content to create. The owner is a small business working with a limited budget.`
  };

  const modeSuggestions = {
    all: ['Find me a Multani jewelry supplier', 'Write 3 TikTok captions for my launch', 'Draft a message to a new supplier', 'Plan my first product launch'],
    supplier: ['Find Multani style jewelry suppliers on Alibaba', 'What questions should I ask a new supplier?', 'Find UK-based Pakistani jewelry wholesalers', 'How do I protect myself when ordering samples?'],
    captions: ['Write captions for a new necklace launch', 'Write a TikTok caption about Multani heritage', 'Write 3 Instagram Reel ideas for Maanara', 'Write captions for an Eid collection'],
    message: ['Write a first message to a new Alibaba supplier', 'Write a follow-up message after no reply', 'Write a message asking for samples and pricing', 'Write a message ending contact professionally'],
    launch: ['Plan my first Maanara launch in 4 weeks', 'Create a launch plan for an Eid collection', 'Plan a soft launch with 5 products', 'What should I do the week before launch?']
  };

  function setMode(mode, btn) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const sugg = document.getElementById('suggestions');
    sugg.innerHTML = modeSuggestions[mode].map(s =>
      `<button class="suggestion" onclick="useSuggestion(this)">${s}</button>`
    ).join('');
  }

  function useSuggestion(btn) {
    input.value = btn.textContent;
    autoResize(input);
    send();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function addMessage(role, html) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'ai'
      ? `<div class="avatar ai">M</div>`
      : `<div class="avatar user-av">👤</div>`;
    div.innerHTML = `${avatar}<div class="bubble">${html}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `<div class="avatar ai">M</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function formatResponse(text) {
    // Convert markdown-like formatting to HTML
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    // Convert line breaks
    text = text.replace(/\n\n/g, '</p><p style="margin-top:10px">');
    text = text.replace(/\n/g, '<br>');
    // Add copy button for messages/captions
    return `<p>${text}</p>`;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    // Remove welcome screen
    const welcome = chat.querySelector('.welcome');
    if (welcome) welcome.remove();

    // Add user message
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;

    // Show typing
    addTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: modePrompts[currentMode],
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content[0]) {
        const responseText = data.content[0].text;
        const msgDiv = addMessage('ai', formatResponse(responseText));

        // Add copy button
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy response';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(responseText);
          copyBtn.textContent = '✓ Copied';
          setTimeout(() => copyBtn.textContent = 'Copy response', 2000);
        };
        msgDiv.querySelector('.bubble').appendChild(copyBtn);
      } else {
        addMessage('ai', 'Something went wrong. Please try again.');
      }
    } catch (err) {
      removeTyping();
      addMessage('ai', 'Connection error. Please check your internet and try again.');
    }

    isLoading = false;
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
