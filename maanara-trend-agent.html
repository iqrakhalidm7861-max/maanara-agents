<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maanara Trend Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --gold-dim: rgba(201,168,76,0.15);
    --dark: #0a0806;
    --dark2: #131008;
    --dark3: #1a1509;
    --cream: #f8f4ec;
    --muted: #7a6e58;
    --border: rgba(201,168,76,0.18);
    --hot: #e85d4a;
    --warm: #e8a84c;
    --cool: #4c8fe8;
    --green: #4ade80;
  }

  html, body { height: 100%; background: var(--dark); color: var(--cream); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 15% 50%, rgba(201,168,76,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(232,93,74,0.04) 0%, transparent 50%),
                var(--dark);
    z-index: 0;
  }

  .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; max-width: 860px; margin: 0 auto; }

  /* HEADER */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,8,6,0.85); backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 10;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-icon {
    width: 38px; height: 38px; border: 1px solid var(--gold);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: var(--gold-dim);
  }

  .brand-icon svg { width: 16px; height: 16px; fill: var(--gold); }

  .brand-name { font-family: 'Cinzel', serif; font-size: 15px; letter-spacing: 0.15em; color: var(--gold-light); }
  .brand-tag { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border: 1px solid rgba(74,222,128,0.3);
    border-radius: 100px; background: rgba(74,222,128,0.05);
    font-size: 11px; color: var(--green); letter-spacing: 0.08em;
  }

  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 6px var(--green); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* MAIN */
  main { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* INPUT SECTION */
  .input-card {
    background: rgba(255,255,255,0.025); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 14px;
  }

  .input-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; }

  .input-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .tabs { display: flex; gap: 8px; flex-wrap: wrap; }

  .tab {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 100px;
    background: transparent; color: var(--muted); font-family: 'Jost', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }

  .tab:hover, .tab.active { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }

  .input-row { display: flex; gap: 10px; align-items: flex-end; }

  textarea {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; color: var(--cream);
    font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300;
    resize: none; min-height: 80px; outline: none; transition: border-color 0.2s; line-height: 1.6;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: rgba(201,168,76,0.4); }

  .analyze-btn {
    padding: 12px 22px; background: linear-gradient(135deg, var(--gold), #9a6820);
    border: none; border-radius: 12px; color: var(--dark); font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    white-space: nowrap; letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(201,168,76,0.25);
  }

  .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(201,168,76,0.35); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* QUICK ANALYZE */
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; }

  .quick-btn {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 100px;
    background: transparent; color: var(--muted); font-family: 'Jost', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: left;
  }

  .quick-btn:hover { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }

  /* RESULTS */
  .results { display: flex; flex-direction: column; gap: 16px; }

  .result-card {
    background: rgba(255,255,255,0.025); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; animation: slideIn 0.4s ease;
  }

  @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .result-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(201,168,76,0.04);
  }

  .result-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.15em; color: var(--gold); }
  .result-time { font-size: 11px; color: var(--muted); }

  .result-body { padding: 20px; }

  .result-body p { font-size: 14px; line-height: 1.75; color: var(--cream); margin-bottom: 12px; }
  .result-body p:last-child { margin-bottom: 0; }
  .result-body strong { color: var(--gold-light); font-weight: 500; }

  /* TREND SCORES */
  .trend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 14px 0; }

  .trend-item {
    padding: 12px; border: 1px solid var(--border); border-radius: 10px;
    background: rgba(255,255,255,0.02); text-align: center;
  }

  .trend-score { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; margin-bottom: 4px; }
  .trend-score.hot { color: var(--hot); }
  .trend-score.warm { color: var(--warm); }
  .trend-score.cool { color: var(--cool); }
  .trend-score.green { color: var(--green); }

  .trend-name { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }

  /* BAR CHART */
  .bar-list { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }

  .bar-item { display: flex; flex-direction: column; gap: 5px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; }
  .bar-name { color: var(--cream); }
  .bar-pct { color: var(--gold); }
  .bar-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 1s ease; }

  /* PILLS */
  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 10px 0; }

  .pill {
    padding: 4px 12px; border-radius: 100px; font-size: 11px; letter-spacing: 0.06em;
  }

  .pill.hot { background: rgba(232,93,74,0.12); border: 1px solid rgba(232,93,74,0.3); color: #f0897a; }
  .pill.warm { background: rgba(232,168,76,0.12); border: 1px solid rgba(232,168,76,0.3); color: #f0c07a; }
  .pill.avoid { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: var(--muted); text-decoration: line-through; }

  /* COPY */
  .copy-btn {
    margin-top: 12px; padding: 6px 14px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); border-radius: 100px;
    font-size: 11px; font-family: 'Jost', sans-serif; cursor: pointer; transition: all 0.2s;
  }

  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* LOADING */
  .loading { display: flex; align-items: center; gap: 10px; padding: 20px; color: var(--muted); font-size: 13px; }
  .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DIVIDER */
  .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; white-space: nowrap; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    main { padding: 16px; gap: 16px; }
    .input-card { padding: 16px; }
    .result-body { padding: 16px; }
    .trend-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="bg"></div>

<div class="app">
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm14 3a4 4 0 100-8 4 4 0 000 8z"/></svg>
      </div>
      <div>
        <div class="brand-name">MAANARA</div>
        <div class="brand-tag">Trend Intelligence</div>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div> Live Analysis</div>
  </header>

  <main>
    <!-- INPUT CARD -->
    <div class="input-card">
      <div class="input-label">✦ What do you want to analyse?</div>
      <div class="input-desc">Paste in what you've seen — TikTok captions, Instagram descriptions, product names, hashtags, engagement numbers, anything. Your agent will do the maths and tell you what's trending for Maanara.</div>

      <div class="tabs">
        <button class="tab active" onclick="setTab('paste', this)">📋 Paste Content</button>
        <button class="tab" onclick="setTab('describe', this)">💬 Describe What You Saw</button>
        <button class="tab" onclick="setTab('hashtag', this)"># Hashtag Research</button>
        <button class="tab" onclick="setTab('competitor', this)">🔍 Competitor Check</button>
      </div>

      <div class="input-row">
        <textarea id="userInput" placeholder="Paste captions, product descriptions, hashtags, engagement numbers — anything you've saved or seen on TikTok/Instagram about jewelry…"></textarea>
      </div>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">✦ Analyse Trends</button>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">or try a quick analysis</div><div class="divider-line"></div></div>

      <div class="quick-btns">
        <button class="quick-btn" onclick="quickAnalyze('What jewelry styles are trending on TikTok UK right now in 2026? What sells best for South Asian inspired demi-fine brands?')">🔥 What\'s hot right now</button>
        <button class="quick-btn" onclick="quickAnalyze('What jewelry trends are declining or oversaturated in 2026? What should Maanara avoid stocking?')">📉 What to avoid</button>
        <button class="quick-btn" onclick="quickAnalyze('What are the best performing hashtags for jewelry brands on TikTok and Instagram UK in 2026? Focus on South Asian, Pakistani, demi-fine and luxury jewelry niches.')">📌 Best hashtags for Maanara</button>
        <button class="quick-btn" onclick="quickAnalyze('What jewelry pieces have the highest profit margins for small UK brands reselling wholesale? What price points work best on TikTok shop?')">💰 Best profit pieces</button>
        <button class="quick-btn" onclick="quickAnalyze('What jewelry content performs best on TikTok for South Asian brands? What type of videos go viral for jewelry?')">🎬 Viral content formula</button>
        <button class="quick-btn" onclick="quickAnalyze('Analyse current jewelry trends for Eid, weddings and Pakistani cultural occasions in the UK market 2026. What pieces should Maanara prioritise?')">✨ Eid & wedding trends</button>
      </div>
    </div>

    <!-- RESULTS AREA -->
    <div class="results" id="results"></div>
  </main>
</div>

<script>
  let currentTab = 'paste';

  const tabPlaceholders = {
    paste: 'Paste captions, product descriptions, hashtags, engagement numbers — anything you\'ve saved or seen on TikTok/Instagram about jewelry…',
    describe: 'Describe what you saw — e.g. "I kept seeing gold layered necklaces with green stones getting 50k likes, and chunky hoops with 8k saves. Silver oxidised pieces seem less popular lately…"',
    hashtag: 'Paste hashtags you\'ve seen used, or just ask — e.g. "What hashtags should Maanara use for a gold bracelet TikTok aimed at Pakistani women in the UK?"',
    competitor: 'Describe a competitor or paste their bio/captions — e.g. "This brand called Nour Jewels posts minimal gold pieces and gets 100k views. Their top posts are always layering reels…"'
  };

  const systemPrompts = {
    paste: `You are Maanara's Trend Intelligence Agent. Maanara is a UK-registered demi-fine jewelry brand inspired by Multani Pakistani heritage. Analyse the content the user pastes and identify: 1) What's trending and selling well, 2) What's declining or oversaturated, 3) Specific recommendations for Maanara's product range and content strategy. Use real data thinking — mention engagement patterns, price points, and consumer behaviour. Be specific, actionable, and honest. Format clearly with sections. Use ✦ for key insights.`,
    
    describe: `You are Maanara's Trend Intelligence Agent. Maanara is a UK-registered demi-fine jewelry brand inspired by Multani Pakistani heritage. The user is describing jewelry trends they've observed on social media. Analyse what they're describing, validate or add context to their observations, and give specific recommendations for what Maanara should stock, create, and post. Include trend scores, what's hot vs declining, and specific product recommendations. Be direct and data-driven.`,
    
    hashtag: `You are Maanara's Hashtag and Discoverability Agent for jewelry. Research and provide the best hashtags for Maanara — a UK demi-fine jewelry brand with Multani Pakistani heritage. Categorise hashtags by: mega (1M+ posts), large (100k-1M), niche (under 100k — best for reach). Include TikTok and Instagram separately. Give specific hashtag sets for different content types: product reveals, heritage storytelling, styling videos, behind the scenes. Tell them which combinations perform best.`,
    
    competitor: `You are Maanara's Competitive Intelligence Agent. Analyse the competitor information the user provides and extract: what's working for them, their price points, content strategy, engagement patterns, and gaps Maanara can exploit. Give Maanara a clear competitive advantage strategy. Be honest — if a competitor is doing something well, say so, but always find the angle where Maanara's Multani heritage story wins.`
  };

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('userInput').placeholder = tabPlaceholders[tab];
  }

  function quickAnalyze(prompt) {
    document.getElementById('userInput').value = prompt;
    analyze();
  }

  function now() {
    return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function addLoading() {
    const div = document.createElement('div');
    div.className = 'result-card';
    div.id = 'loading-card';
    div.innerHTML = `<div class="loading"><div class="spin"></div> Analysing trends for Maanara…</div>`;
    document.getElementById('results').prepend(div);
  }

  function removeLoading() {
    const l = document.getElementById('loading-card');
    if (l) l.remove();
  }

  function formatResult(text, query) {
    // Parse the text and create rich formatted output
    let formatted = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/✦/g, '<span style="color:var(--gold)">✦</span>')
      .replace(/🔥/g, '🔥')
      .replace(/📉/g, '📉')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    const time = now();
    const tabLabels = { paste: 'Content Analysis', describe: 'Trend Observation', hashtag: 'Hashtag Intelligence', competitor: 'Competitive Analysis' };

    return `
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">✦ ${tabLabels[currentTab] || 'Trend Analysis'}</div>
          <div class="result-time">${time}</div>
        </div>
        <div class="result-body">
          <p>${formatted}</p>
          <button class="copy-btn" onclick="copyResult(this, \`${text.replace(/`/g, '\\`')}\`)">Copy analysis</button>
        </div>
      </div>
    `;
  }

  function copyResult(btn, text) {
    navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = 'Copy analysis', 2000);
  }

  async function analyze() {
    const input = document.getElementById('userInput').value.trim();
    if (!input) return;

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = 'Analysing…';

    addLoading();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompts[currentTab],
          messages: [{ role: 'user', content: input }]
        })
      });

      const data = await response.json();
      removeLoading();

      if (data.content && data.content[0]) {
        const text = data.content[0].text;
        const resultsDiv = document.getElementById('results');
        const div = document.createElement('div');
        div.innerHTML = formatResult(text, input);
        resultsDiv.prepend(div.firstElementChild);
      } else {
        removeLoading();
        showError();
      }
    } catch (err) {
      removeLoading();
      showError();
    }

    btn.disabled = false;
    btn.textContent = '✦ Analyse Trends';
    document.getElementById('userInput').value = '';

    // Scroll to results
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError() {
    const div = document.createElement('div');
    div.className = 'result-card';
    div.innerHTML = `<div class="result-body"><p>Connection error. Please check your internet and try again.</p></div>`;
    document.getElementById('results').prepend(div);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) analyze();
  });
</script>
</body>
</html>
